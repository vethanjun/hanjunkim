<html lang="ko">
<head>

  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">

      <text text-anchor="middle" font-size="140" font-style="italic" font-weight="600" y="-20">Kim Lab</text>
      <text text-anchor="middle" font-size="32" y="40" opacity="0.8" font-family="monospace" letter-spacing="4">KU · PPL</text>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #fafbfc; }
  body { font-family: 'Inter Tight', system-ui, sans-serif; color: #0f1419; }
  * { box-sizing: border-box; }
  button { font-family: inherit; }
  a { text-decoration: none; color: inherit; }
  #tweaks-panel { font-family: 'Inter Tight', sans-serif; }
  #splash {
    position: fixed; inset: 0; background: #8b1a1a;
    display: flex; align-items: center; justify-content: center;
    z-index: 9999; transition: opacity 0.4s ease;
  }
  #splash svg { width: 100%; height: 100%; object-fit: contain; }
</style>
</head>
<body>
<div id="root"></div>
<div id="splash">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#8b1a1a"/>
    <g transform="translate(600 400)" fill="#f5e6d3" font-family="Georgia, serif">
      <text text-anchor="middle" font-size="140" font-style="italic" font-weight="600" y="-20">Kim Lab</text>
      <text text-anchor="middle" font-size="32" y="40" opacity="0.8" font-family="monospace" letter-spacing="4">KU · PPL</text>
    </g>
  </svg>
</div>
<script>
  // Remove splash once React mounts
  document.addEventListener('DOMContentLoaded', function() {
    var observer = new MutationObserver(function() {
      if (document.getElementById('root').childElementCount > 0) {
        var splash = document.getElementById('splash');
        if (splash) {
          splash.style.opacity = '0';
          setTimeout(function() { splash.remove(); }, 400);
        }
        observer.disconnect();
      }
    });
    observer.observe(document.getElementById('root'), { childList: true });
  });
</script>

<script>
  // Pre-compute asset root once at page load
  (function() {
    var loc = window.location;
    if (loc.hostname === 'hanjunkim.co.kr' || loc.hostname === 'www.hanjunkim.co.kr') {
      window.__assetRoot = '/';
    } else {
      // Preview: derive base from current URL path up to the last '/'
      // e.g. https://....claudeusercontent.com/v1/design/.../serve/ 
      var path = loc.href;
      // Find 'serve/' in the URL
      var m = path.match(/^(.*\/serve\/)/);
      window.__assetRoot = m ? m[1] : (loc.origin + '/');
    }
  })();
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="v2/shared.jsx"></script>
<script type="text/babel" src="v2/data-publications.jsx"></script>
<script type="text/babel" src="v2/home.jsx"></script>
<script type="text/babel" src="v2/pages.jsx"></script>

<script type="text/babel">
function App() {
  // URL-based routing: /home, /research, /people, /publications, /news, /contact
  const pathToPage = {
    '': 'Home', 'home': 'Home', 'research': 'Research', 'people': 'People',
    'publications': 'Publications', 'news': 'News', 'contact': 'Contact',
  };
  // Handle GitHub Pages 404 redirect
  const getPageFromPath = () => {
    const redirect = sessionStorage.getItem('kimlab-redirect-path');
    if (redirect) {
      sessionStorage.removeItem('kimlab-redirect-path');
      window.history.replaceState(null, '', redirect);
    }
    const path = window.location.pathname.replace(/^\//, '').toLowerCase().split('/')[0];
    return pathToPage[path] || 'Home';
  };

  const [page, setPage] = React.useState(getPageFromPath());
  const [tweaksOn, setTweaksOn] = React.useState(false);
  const [accent, setAccent] = React.useState(B.accent);

  const onNav = (p) => {
    setPage(p);
    const slug = p.toLowerCase();
    window.history.pushState({page: p}, '', '/' + (slug === 'home' ? '' : slug));
    if (typeof window.gtag === 'function') {
      window.gtag('event', 'page_view', {
        page_title: `Kim Lab - ${p}`,
        page_path: `/${slug}`,
      });
    }
    window.scrollTo({ top: 0 });
    window.__kuNavTo = onNav;
  };

  // Handle browser back/forward
  React.useEffect(() => {
    window.__kuNavTo = onNav;
    const onPop = () => setPage(getPageFromPath());
    window.addEventListener('popstate', onPop);
    return () => window.removeEventListener('popstate', onPop);
  }, []);

  // Live-apply accent to window.B
  React.useEffect(() => { B.accent = accent; }, [accent]);

  // Tweaks protocol
  React.useEffect(() => {
    const onMsg = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOn(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOn(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({type: '__edit_mode_available'}, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const setAccentPersist = (c) => {
    setAccent(c);
    window.parent.postMessage({type: '__edit_mode_set_keys', edits: {accent: c}}, '*');
  };

  const Page = {
    Home: HomePage,
    Research: ResearchPage,
    People: PeoplePage,
    Publications: PublicationsPage,
    News: NewsPage,
    Contact: ContactPage,
  }[page] || HomePage;

  return (
    <div style={{ minHeight: '100vh', background: 'white', maxWidth: 1560, margin: '0 auto', boxShadow: '0 0 0 1px #eef0f2' }}>
      <Nav active={page} onNav={onNav}/>
      <div key={page}>
        <Page onNav={onNav}/>
      </div>
      <Footer/>

      {tweaksOn && (
        <div id="tweaks-panel" style={{
          position: 'fixed', bottom: 20, right: 20, width: 260,
          background: 'white', borderRadius: 12, padding: 16,
          boxShadow: '0 10px 40px rgba(0,0,0,0.15), 0 0 0 1px #e4e6ea',
          zIndex: 100, fontSize: 13,
        }}>
          <div style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 10, letterSpacing: 1.5, color: '#6b7684', marginBottom: 12 }}>
            ── TWEAKS
          </div>
          <div style={{ fontSize: 12, fontWeight: 600, marginBottom: 8 }}>Accent color</div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 6, marginBottom: 10 }}>
            {[
              ['#8b1a1a','KU Crimson'],
              ['#a8321e','Brick'],
              ['#1e3a5f','Navy'],
              ['#14532d','Forest'],
              ['#5b21b6','Violet'],
              ['#b45309','Amber'],
              ['#0f766e','Teal'],
              ['#1f2937','Graphite'],
            ].map(([c,name]) => (
              <button key={c} onClick={() => setAccentPersist(c)} title={name} style={{
                width: '100%', aspectRatio: '1', borderRadius: 6,
                background: c, border: accent === c ? '2px solid #0f1419' : '1px solid #e4e6ea',
                cursor: 'pointer', padding: 0,
              }}/>
            ))}
          </div>
          <input type="color" value={accent} onChange={e => setAccentPersist(e.target.value)}
            style={{ width: '100%', height: 28, border: '1px solid #e4e6ea', borderRadius: 4, cursor: 'pointer' }}/>
          <div style={{ fontSize: 10, color: '#6b7684', marginTop: 8, lineHeight: 1.4 }}>
            현재 값: <code style={{ fontFamily: 'JetBrains Mono, monospace' }}>{accent}</code>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

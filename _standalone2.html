<script type="text/babel" src="v2/sa_data-publications.jsx"></script>
<script type="text/babel" src="v2/sa_home.jsx"></script>
<script type="text/babel" src="v2/sa_pages.jsx"></script>

<script type="text/babel">
function App() {
  const saved = (() => { try { return localStorage.getItem('kimlab-page') || 'Home'; } catch { return 'Home'; } })();
  const [page, setPage] = React.useState(saved);
  const [tweaksOn, setTweaksOn] = React.useState(false);
  const [accent, setAccent] = React.useState(B.accent);

  const onNav = (p) => {
    setPage(p);
    try { localStorage.setItem('kimlab-page', p); } catch {}
    window.scrollTo({ top: 0 });
    window.__kuNavTo = onNav; // expose for footer links
  };
  React.useEffect(() => { window.__kuNavTo = onNav; }, []);

  // Live-apply accent to window.B
  React.useEffect(() => { B.accent = accent; }, [accent]);

  // Tweaks protocol
  React.useEffect(() => {
    const onMsg = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOn(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOn(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({type: '__edit_mode_available'}, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const setAccentPersist = (c) => {
    setAccent(c);
    window.parent.postMessage({type: '__edit_mode_set_keys', edits: {accent: c}}, '*');
  };

  const Page = {
    Home: HomePage,
    Research: ResearchPage,
    People: PeoplePage,
    Publications: PublicationsPage,
    News: NewsPage,
    Contact: ContactPage,
  }[page] || HomePage;

  return (
    <div style={{ minHeight: '100vh', background: 'white', maxWidth: 1360, margin: '0 auto', boxShadow: '0 0 0 1px #eef0f2' }}>
      <Nav active={page} onNav={onNav}/>
      <div key={page}>
        <Page onNav={onNav}/>
      </div>
      <Footer/>

      {tweaksOn && (
        <div id="tweaks-panel" style={{
          position: 'fixed', bottom: 20, right: 20, width: 260,
          background: 'white', borderRadius: 12, padding: 16,
          boxShadow: '0 10px 40px rgba(0,0,0,0.15), 0 0 0 1px #e4e6ea',
          zIndex: 100, fontSize: 13,
        }}>
          <div style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 10, letterSpacing: 1.5, color: '#6b7684', marginBottom: 12 }}>
            ── TWEAKS
          </div>
          <div style={{ fontSize: 12, fontWeight: 600, marginBottom: 8 }}>Accent color</div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 6, marginBottom: 10 }}>
            {[
              ['#8b1a1a','KU Crimson'],
              ['#a8321e','Brick'],
              ['#1e3a5f','Navy'],
              ['#14532d','Forest'],
              ['#5b21b6','Violet'],
              ['#b45309','Amber'],
              ['#0f766e','Teal'],
              ['#1f2937','Graphite'],
            ].map(([c,name]) => (
              <button key={c} onClick={() => setAccentPersist(c)} title={name} style={{
                width: '100%', aspectRatio: '1', borderRadius: 6,
                background: c, border: accent === c ? '2px solid #0f1419' : '1px solid #e4e6ea',
                cursor: 'pointer', padding: 0,
              }}/>
            ))}
          </div>
          <input type="color" value={accent} onChange={e => setAccentPersist(e.target.value)}
            style={{ width: '100%', height: 28, border: '1px solid #e4e6ea', borderRadius: 4, cursor: 'pointer' }}/>
          <div style={{ fontSize: 10, color: '#6b7684', marginTop: 8, lineHeight: 1.4 }}>
            현재 값: <code style={{ fontFamily: 'JetBrains Mono, monospace' }}>{accent}</code>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
